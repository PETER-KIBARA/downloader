services:
  - type: web
    name: umd-api
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile.backend
    dockerCommand: uvicorn backend_starter:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: STORAGE_PATH
        value: /tmp/umd_downloads
      - key: REDIS_URL
        fromService:
          type: redis
          name: umd-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: umd-redis
          property: connectionString
      - key: CELERY_BACKEND_URL
        fromService:
          type: redis
          name: umd-redis
          property: connectionString

  - type: worker
    name: umd-telegram-bot
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile.backend
    dockerCommand: python telegram_bot.py
    autoDeploy: true
    envVars:
      - key: STORAGE_PATH
        value: /tmp/umd_downloads
      - key: REDIS_URL
        fromService:
          type: redis
          name: umd-redis
          property: connectionString

  - type: redis
    name: umd-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
