version: '3.8'

services:
  # Frontend - React Development Server
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app/src
    command: npm start
    depends_on:
      - backend

  # Backend - FastAPI Application
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DATABASE_URL=postgresql://umd_user:umd_password@postgres:5432/umd_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_BACKEND_URL=redis://redis:6379/1
      - STORAGE_PATH=/tmp/downloads
    volumes:
      - ./backend:/app
      - downloads:/tmp/downloads
    command: uvicorn backend_starter:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=umd_user
      - POSTGRES_PASSWORD=umd_password
      - POSTGRES_DB=umd_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umd_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Celery Worker for async jobs
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - ENV=development
      - DATABASE_URL=postgresql://umd_user:umd_password@postgres:5432/umd_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_BACKEND_URL=redis://redis:6379/1
      - STORAGE_PATH=/tmp/downloads
    volumes:
      - ./backend:/app
      - downloads:/tmp/downloads
    command: celery -A backend_starter worker --loglevel=info
    depends_on:
      - postgres
      - redis

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  downloads:

networks:
  default:
    name: umd_network
